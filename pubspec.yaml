name: traveloop
description: AI-powered travel planning app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.0.0

  # Firebase (Auth only — data stored locally)
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0

  # UI Components
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  table_calendar: ^3.0.9
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  share_plus: ^7.2.1
  path_provider: ^2.1.1

  # Local Storage (ALL trip/profile data stored on device)
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Animations
  flutter_animate: ^4.3.0

  # Form Validation
  email_validator: ^2.1.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/illustrations/
